# One-shot Cloud Build config for a manual Firestore backfill script.
#
# This config is intentionally parameterized: you pick which script to
# run via the `_BACKFILL_SCRIPT` substitution, so the same trigger can
# be reused for multiple one-off backfills without editing code.
#
# Available scripts in this repo:
#   scripts/backfill-subject-field.ts
#     — Adds a `subject` field to legacy docs missing one. Probably
#       already run once; keep until you're sure every doc has it.
#
#   scripts/backfill-actual-topics.ts   (default)
#     — Parses the topic list out of each doc's storagePath filename
#       and writes it back to `metadata.actualSubTopics` for docs
#       whose actualSubTopics is empty. Fixes the "Topics: —" and
#       "Units: Random" columns on the access site for legacy docs.
#
#   scripts/rebuild-all-manifests.ts
#     — Writes/rebuilds the per-subject manifest JSON in Storage at
#       frq-archive/manifests/<subject>.json. Run this ONCE after
#       deploying the rebuildManifestOnFrqWrite Cloud Function for
#       the first time, so the access site has manifests to read
#       before any new FRQ writes happen. Safe to re-run any time
#       (idempotent).
#
# How to use:
#   1. In Google Cloud Console → Cloud Build → Triggers, create a
#      manual trigger called "ap-frq-access-backfill":
#        - Event:  Manual invocation
#        - Source: the ap-frq-access repo, any branch
#        - Configuration: Cloud Build configuration file (yaml)
#        - Location: Repository → `cloudbuild.backfill.yaml`
#
#   2. Grant the Cloud Build service account
#      (Default compute service account on this project):
#        - "Cloud Datastore User" — read + update docs in `frqs`.
#        - "Storage Object Admin" on the Firebase storage bucket —
#          required by `rebuild-all-manifests.ts` to write the
#          per-subject manifest JSON files. Not needed by the
#          Firestore-only backfills, but cheapest to grant once.
#
#   3. When clicking "Run trigger", override the substitution
#      variables for the specific backfill you want:
#
#        _BACKFILL_SCRIPT=scripts/backfill-actual-topics.ts
#        _DRY_RUN=--dry-run                           (preview first)
#
#      Then again with:
#        _BACKFILL_SCRIPT=scripts/backfill-actual-topics.ts
#        _DRY_RUN=                                    (real run)
#
#   4. Verify the Topics / Units columns on the deployed access site
#      look correct, then delete this file, the scripts it points at,
#      and the trigger itself so nothing can run again by accident.

steps:
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "Installing firebase-admin + tsx for the one-shot backfill…"
        npm init -y >/dev/null
        npm install --silent firebase-admin@12 tsx@4
        echo "Running ${_BACKFILL_SCRIPT} ${_DRY_RUN}"
        npx tsx ${_BACKFILL_SCRIPT} ${_DRY_RUN}
    env:
      - 'GOOGLE_CLOUD_PROJECT=${_FIREBASE_PROJECT_ID}'
      - 'FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}'

# Substitutions — override `_BACKFILL_SCRIPT` to pick which backfill to
# run, and `_DRY_RUN` to `--dry-run` for a safe preview.
substitutions:
  _FIREBASE_PROJECT_ID: 'unique-sentinel-423412-q3'
  _FIREBASE_STORAGE_BUCKET: 'unique-sentinel-423412-q3.firebasestorage.app'
  _BACKFILL_SCRIPT: 'scripts/backfill-actual-topics.ts'
  _DRY_RUN: ''

options:
  logging: CLOUD_LOGGING_ONLY
